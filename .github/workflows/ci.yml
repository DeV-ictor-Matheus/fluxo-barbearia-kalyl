# Nome do workflow — aparece na aba "Actions" do GitHub.
name: CI

# QUANDO rodar: a cada push na main e em PRs que miram a main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job do backend. Roda numa máquina virtual Ubuntu limpa.
  backend:
    runs-on: ubuntu-latest

    # Como o código vive em backend/, todos os comandos "run"
    # deste job executam DENTRO dessa pasta.
    defaults:
      run:
        working-directory: backend

    steps:
      # 1. Baixa o código do repositório pra dentro da máquina virtual.
      - name: Baixar o código
        uses: actions/checkout@v6

      # 2. Instala o Node na máquina limpa. A versão deve bater com a sua.
      - name: Instalar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      # 3. Instala as dependências de forma limpa e reproduzível.
      - name: Instalar dependências
        run: npm ci

      # 4. Gera o Prisma Client (precisa existir pra o código compilar).
      #    O generate NÃO conecta no banco — só valida a config — então
      #    URLs dummy bastam. O Prisma 7 lê DATABASE_URL (adapter, runtime)
      #    e DIRECT_URL (config, migrations); ambas precisam existir aqui,
      #    mesmo que falsas, senão o config estoura PrismaConfigEnvError.
      - name: Gerar Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
          DIRECT_URL: "postgresql://user:pass@localhost:5432/db"

      # 5. Verifica o estilo e as boas práticas do código.
      - name: Rodar o lint
        run: npm run lint

      # 6. Verifica a correção de tipos (sem gerar arquivos).
      - name: Verificar tipos
        run: npm run type-check

      # 7. Roda os testes. Se algum falhar, o workflow falha (fica vermelho).
      #    Envs dummy garantem que qualquer módulo importado durante a suíte
      #    (ex.: db.ts, requireAuth.ts) resolva suas variáveis sem quebrar
      #    no import. Os testes são de funções puras e não tocam a rede.
      - name: Rodar os testes
        run: npm test
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
          DIRECT_URL: "postgresql://user:pass@localhost:5432/db"
          SUPABASE_URL: "https://dummy.supabase.co"

  # Job do frontend. Sem Prisma e sem banco — o front não tem nada disso.
  frontend:
    runs-on: ubuntu-latest

    # Todos os "run" deste job executam DENTRO de frontend/.
    defaults:
      run:
        working-directory: frontend

    steps:
      # 1. Baixa o código do repositório pra dentro da máquina virtual.
      - name: Baixar o código
        uses: actions/checkout@v6

      # 2. Instala o Node na máquina limpa.
      - name: Instalar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      # 3. Instala as dependências de forma limpa e reproduzível.
      - name: Instalar dependências
        run: npm ci

      # 4. Verifica o estilo e as boas práticas do código.
      - name: Rodar o lint
        run: npm run lint

      # 5. Verifica a correção de tipos (sem gerar arquivos).
      - name: Verificar tipos
        run: npm run type-check

      # 6. Roda os testes. Se algum falhar, o workflow falha (fica vermelho).
      - name: Rodar os testes
        run: npm test
